name: Résumé Quotidien de l'Activité
on:
  schedule:
    - cron: '0 18 * * *' # S'exécute tous les jours à 18h00 UTC
  workflow_dispatch:      # Permet de le lancer manuellement pour tester

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour voir les commits

      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install google-generativeai

      - name: Générer le résumé
        id: generate_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # On exécute le script et on capture la sortie dans une variable d'environnement GitHub
          # Pour gérer les retours à la ligne, on utilise une syntaxe spéciale de GitHub Actions
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          python - <<EOF >> $GITHUB_ENV
          import os
          import subprocess
          import google.generativeai as genai

          try:
              commits = subprocess.check_output(['git', 'log', '--since="24 hours ago"', '--pretty=format:%s']).decode('utf-8')
              if not commits.strip():
                  print("Rien à signaler aujourd'hui ! ☕")
              else:
                  genai.configure(api_key=os.environ["GEMINI_API_KEY"])
                  model = genai.GenerativeModel('gemini-1.5-flash')
                  prompt = f"Résume ces commits GitHub en français de manière pro et concise : \n{commits}"
                  response = model.generate_content(prompt)
                  print(response.text)
          except Exception as e:
              print(f"Erreur : {e}")
          EOF
          echo "EOF" >> $GITHUB_ENV

      - name: Envoyer sur Telegram
        run: |
          # On utilise curl pour envoyer un message simple via l'API Telegram
          # On encode le texte pour éviter les erreurs avec les caractères spéciaux
          MESSAGE="<b>📋 Résumé GitHub du jour</b>%0A%0A${{ env.SUMMARY }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML"
