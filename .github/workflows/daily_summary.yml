name: Résumé Quotidien vers Telegram
on:
  schedule:
    - cron: '0 18 * * *' # 18h UTC = 19h/20h heure française
  workflow_dispatch:

jobs:
  summarize_and_send:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 50 # Suffisant pour couvrir 24h de commits

      - name: Générer le résumé avec l'IA
        id: generate_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "SUMMARY<<DELIMITER" >> "$GITHUB_ENV"
          python3 - <<'PYEOF' >> "$GITHUB_ENV"
          import os
          import sys
          import subprocess
          import json
          from urllib.request import Request, urlopen
          from urllib.error import HTTPError, URLError

          try:
              commits = subprocess.check_output(
                  ['git', 'log', '--since=24 hours ago', '--no-merges', '--pretty=format:%s'],
                  timeout=10
              ).decode('utf-8').strip()

              if not commits:
                  print("Rien à signaler aujourd'hui ! ☕")
              else:
                  API_KEY = os.environ["GEMINI_API_KEY"]
                  prompt = f"Fais un résumé court en français des commits suivants avec des emojis :\n{commits}"
                  payload = json.dumps({
                      "contents": [{"parts": [{"text": prompt}]}]
                  }).encode('utf-8')

                  # Essaie les modèles stables (v1) puis expérimentaux (v1beta)
                  MODELS = [
                      ('v1', 'gemini-2.0-flash'),
                      ('v1', 'gemini-2.0-flash-lite'),
                      ('v1beta', 'gemini-2.0-flash'),
                      ('v1beta', 'gemini-2.0-flash-lite'),
                  ]

                  last_error = None
                  for api_version, model_name in MODELS:
                      try:
                          url = f"https://generativelanguage.googleapis.com/{api_version}/models/{model_name}:generateContent?key={API_KEY}"
                          req = Request(url, data=payload, headers={"Content-Type": "application/json"})
                          with urlopen(req, timeout=30) as resp:
                              data = json.loads(resp.read())
                              text = data["candidates"][0]["content"]["parts"][0]["text"]
                              if text:
                                  safe = text.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;')
                                  print(safe)
                                  break
                      except Exception as e:
                          last_error = str(e)
                          print(f"[{api_version}/{model_name}] erreur : {e}", file=sys.stderr)
                          continue
                  else:
                      print(f"IA indisponible. Dernière erreur : {last_error[:200] if last_error else 'inconnue'}")
          except Exception as e:
              print(f"Souci technique : {str(e)[:100]}")
          PYEOF
          echo "DELIMITER" >> "$GITHUB_ENV"

      - name: Envoyer le message sur Telegram
        env:
          T_TOKEN: ${{ secrets.BOT_FATHER_TELEGRAM }}
          T_CHAT_ID: ${{ secrets.ID_BOT_TELEGRAM }}
          SUMMARY: ${{ env.SUMMARY }}
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.telegram.org/bot${T_TOKEN}/sendMessage" \
            -d "chat_id=${T_CHAT_ID}" \
            --data-urlencode "text=📋 Résumé GitHub du jour :

          ${SUMMARY}" \
            -d "parse_mode=HTML")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::warning::Telegram a répondu avec le code $HTTP_CODE"
            echo "$RESPONSE"
            exit 1
          fi
