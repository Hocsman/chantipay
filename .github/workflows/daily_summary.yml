name: Résumé Quotidien vers Telegram
on:
  schedule:
    - cron: '0 18 * * *' # 18h UTC (environ 19h/20h en France)
  workflow_dispatch:      # Pour tester manuellement quand tu veux

jobs:
  summarize_and_send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer l'IA (Gemini)
        run: pip install google-generativeai

      - name: Générer le résumé avec l'IA
        id: generate_step
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "SUMMARY<<EOF" >> $GITHUB_ENV
          python - <<EOF >> $GITHUB_ENV
          import os
          import subprocess
          import google.generativeai as genai

          try:
              # 1. On récupère les commits
              commits = subprocess.check_output(['git', 'log', '--since="24 hours ago"', '--pretty=format:%s']).decode('utf-8')

              if not commits.strip():
                  print("Rien à signaler aujourd'hui ! ☕")
              else:
                  # 2. Configuration de Gemini
                  genai.configure(api_key=os.environ["GEMINI_API_KEY"])

                  # On utilise le nom de modèle le plus stable
                  model = genai.GenerativeModel('gemini-1.5-flash')

                  prompt = f"Résume ces commits GitHub en français. Sois concis avec des emojis :\n{commits}"

                  # 3. Génération avec gestion d'erreur spécifique
                  response = model.generate_content(prompt)

                  if response.text:
                      # Nettoyage pour Telegram
                      print(response.text.replace('<', '&lt;').replace('>', '&gt;'))
                  else:
                      print("L'IA n'a pas pu générer de texte.")
          except Exception as e:
              # On affiche l'erreur pour la voir sur Telegram si ça échoue encore
              print(f"Oups, petit souci avec l'IA : {str(e)[:100]}")
          EOF
          echo "EOF" >> $GITHUB_ENV

      - name: Envoyer le message sur Telegram
        env:
          # On fait correspondre TES noms de secrets aux variables du script
          T_TOKEN: ${{ secrets.BOT_FATHER_TELEGRAM }}
          T_CHAT_ID: ${{ secrets.ID_BOT_TELEGRAM }}
        run: |
          # On s'assure qu'il y a un texte à envoyer
          if [ -z "${{ env.SUMMARY }}" ]; then
            FINAL_TEXT="Rien à signaler aujourd'hui ! ☕"
          else
            FINAL_TEXT="${{ env.SUMMARY }}"
          fi

          # Envoi vers Telegram
          # Note : On utilise --data-urlencode pour gérer les emojis et les sauts de ligne proprement
          curl -s -X POST "https://api.telegram.org/bot${T_TOKEN}/sendMessage" \
            -d "chat_id=${T_CHAT_ID}" \
            --data-urlencode "text=📋 Résumé GitHub du jour :

          $FINAL_TEXT" \
            -d "parse_mode=HTML"
